<!DOCTYPE html>
<html>
<head>
<title>Report Item</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<div class="logo">
<img src="https://reddysurya996.github.io/webproj2/vit.jpg" class="logo">
<span>CampusTrace</span>
</div>

<select onchange="navigate(this.value)" class="dropdown" id="nav">
<option value="index.html">Home</option>
<option value="report.html">Report Item</option>
<option value="items.html">Search Items</option>
<option value="claim.html">Claim Item</option>
</select>
</header>

<div class="card-container">
<div class="form-card">
<h2>Submit Item</h2>

<input type="text" id="name" placeholder="e.g. Wallet / ID Card">
<input type="text" id="location" placeholder="e.g. Library / Hostel">
<select id="type">
<option>Lost</option>
<option>Found</option>
</select>
<input type="text" id="contact" placeholder="e.g. abc@vitstudent.ac.in">

<button onclick="addItem()">Submit</button>
</div>
</div>

<footer>
<p>VIT System</p>
</footer>

<script>
function navigate(page){
if(page) window.location.href = page;
}

let current = window.location.pathname.split("/").pop();
let nav = document.getElementById("nav");

if(nav){
for(let i=0;i<nav.options.length;i++){
if(nav.options[i].value === current){
nav.selectedIndex = i;
}
}
}
</script>

<script src="script.js"></script>
</body>
</html>
